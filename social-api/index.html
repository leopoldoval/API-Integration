<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Social Media - Reddit Reader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .reddit-card { border: none; border-radius: 12px; transition: transform 0.2s; }
        .reddit-card:hover { transform: translateY(-5px); }
        .badge-reddit { background-color: #ff4500; color: white; }
    </style>
</head>
<body class="py-5">

<div class="container">
    <div class="row justify-content-center mb-4">
        <div class="col-12 col-md-8 text-center">
            <h1 class="fw-bold text-dark"><i class="bi bi-share-fill text-danger"></i> Lector de Redes Sociales</h1>
            <p class="text-muted">Consumiendo la API pública de Reddit en tiempo real</p>
            
            <div class="btn-group mt-3 shadow-sm" role="group">
                <button type="button" class="btn btn-outline-dark active" onclick="cambiarSubreddit('gaming', this)">🎮 Videojuegos</button>
                <button type="button" class="btn btn-outline-dark" onclick="cambiarSubreddit('anime', this)">🌸 Anime</button>
                <button type="button" class="btn btn-outline-dark" onclick="cambiarSubreddit('technology', this)">💻 Tecnología</button>
            </div>
        </div>
    </div>

    <div id="loader" class="text-center my-5">
        <div class="spinner-border text-danger" role="status">
            <span class="visually-hidden">Cargando feeds...</span>
        </div>
    </div>

    <div id="postsContainer" class="row g-4 d-none">
        </div>

    <div id="errorSocial" class="alert alert-danger d-none text-center" role="alert"></div>
</div>

<script src="app.js"></script>
</body>
</html>
