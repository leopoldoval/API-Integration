<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Geolocalización - Clima</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6">
            <div class="card shadow border-0 p-4">
                <h2 class="text-center mb-4 fw-bold text-primary"><i class="bi bi-cloud-sun"></i> Consulta del Clima</h2>
                
                <div class="input-group mb-3">
                    <input type="text" id="ciudadInput" class="form-control" placeholder="Escribe una ciudad (ej. Tepic)" value="Tepic">
                    <button class="btn btn-primary" id="btnBuscar">Buscar</button>
                </div>

                <div id="climaCard" class="card d-none bg-primary text-white text-center p-4 mt-3 border-0 rounded-4">
                    <h3 id="climaCiudad" class="fw-bold">--</h3>
                    <img id="climaIcono" src="" alt="Icono clima" class="mx-auto" style="width: 100px;">
                    <h1 id="climaTemp" class="display-3 fw-bold">0°C</h1>
                    <p id="climaDescripcion" class="text-capitalize fs-5">--</p>
                </div>
                
                <div id="errorMensaje" class="alert alert-danger d-none mt-3" role="alert"></div>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
