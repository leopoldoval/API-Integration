<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Open Data - NASA APOD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0b0f19;
            color: #f8f9fa;
        }
        .nasa-card {
            background-color: #161f30;
            border: 1px solid #25334a;
            border-radius: 12px;
        }
        .img-space {
            border-radius: 8px;
            max-height: 500px;
            object-fit: cover;
            width: 100%;
        }
    </style>
</head>
<body class="py-5">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            
            <div class="text-center mb-4">
                <h1 class="fw-bold text-info"><i class="bi bi-rocket-takeoff"></i> Datos Abiertos de la NASA</h1>
                <p class="text-muted">Consumiendo la API de la Foto Astronómica del Día (APOD)</p>
            </div>

            <div id="loader" class="text-center my-5">
                <div class="spinner-border text-info" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
                <p class="mt-2 text-muted">Solicitando datos al servidor de la NASA...</p>
            </div>

            <div id="nasaContent" class="card nasa-card shadow p-4 d-none">
                <h2 id="nasaTitle" class="fw-bold text-white mb-2">--</h2>
                <div class="badge bg-info text-dark mb-3 justify-content-start w-auto" id="nasaDate">--</div>
                
                <div id="mediaContainer" class="mb-4"></div>
                
                <h5 class="fw-bold text-info"><i class="bi bi-info-circle"></i> Descripción Científica:</h5>
                <p id="nasaExplanation" class="text-light lh-base" style="text-align: justify;">--</p>
            </div>

            <div id="errorNasa" class="alert alert-danger d-none mt-3" role="alert"></div>

        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
