<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Streaming - Reproductor Abierto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b0f19; color: #fff; }
        .stream-box { border: 2px solid #00f2fe; border-radius: 12px; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="py-5">

<div class="container">
    <div class="row justify-content-center mb-4">
        <div class="col-12 col-md-8 text-center">
            <h1 class="fw-bold text-info"><i class="bi bi-broadcast"></i> Plataforma de Streaming Abierta</h1>
            <p class="text-muted">Consumiendo flujos multimedia directos de servidores de datos abiertos</p>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="stream-box shadow-lg mb-4">
                <div class="ratio ratio-16x9">
                    <video id="videoPlayer" controls poster="https://images.unsplash.com/photo-1536240478700-b869070f9279?w=800">
                        <source id="videoSource" src="https://archive.org/download/BigBuckBunny_124/BigBuckBunny.mp4" type="video/mp4">
                        Tu navegador no soporta reproducción de video.
                    </video>
                </div>
            </div>

            <div class="text-center">
                <h5 class="mb-3 fw-semibold text-secondary">Cambiar canal de streaming:</h5>
                <div class="d-flex flex-wrap justify-content-center gap-2">
                    <button class="btn btn-info text-white px-4 py-2" onclick="cambiarCanal('https://archive.org/download/BigBuckBunny_124/BigBuckBunny.mp4')">
                        <i class="bi bi-play-fill"></i> Animación (Big Buck Bunny)
                    </button>
                    <button class="btn btn-outline-light px-4 py-2" onclick="cambiarCanal('https://archive.org/download/Popeye_forPresident/Popeye_forPresident_512kb.mp4')">
                        <i class="bi bi-play-fill"></i> Clásico (Popeye)
                    </button>
                    <button class="btn btn-outline-light px-4 py-2" onclick="cambiarCanal('https://archive.org/download/ElephantsDream/ed_1024_512kb.mp4')">
                        <i class="bi bi-play-fill"></i> Cortometraje 3D
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
